server {
    listen 80;
    server_name molefinance.net www.molefinance.net;

    location /.well-known/acme-challenge/ {
        root /var/www/molefinance/certbot;
    }

    location / {
        return 301 https://molefinance.net$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name molefinance.net www.molefinance.net;

    ssl_certificate     /etc/letsencrypt/live/molefinance.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/molefinance.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    if ($host = www.molefinance.net) {
        return 301 https://molefinance.net$request_uri;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/molefinance/current;
    index index.html;

    location ~* \.wasm$ {
        default_type application/wasm;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /prober.json {
        alias /var/lib/mole/prober.json;
        add_header Cache-Control "no-store";
        default_type application/json;
    }
}
