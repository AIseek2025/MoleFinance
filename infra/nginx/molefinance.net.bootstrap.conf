server {
    listen 80;
    server_name molefinance.net www.molefinance.net;

    location /.well-known/acme-challenge/ {
        root /var/www/molefinance/certbot;
    }

    root /var/www/molefinance/current;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
